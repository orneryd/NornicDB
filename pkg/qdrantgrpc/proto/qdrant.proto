// Qdrant-compatible gRPC API for NornicDB
// Pinned to Qdrant v1.16.x API surface
//
// This provides a complete Qdrant gRPC API to enable full SDK compatibility.
// All operations map directly to NornicDB's storage and search services.

syntax = "proto3";

package qdrant;

option go_package = "github.com/orneryd/nornicdb/pkg/qdrantgrpc/gen";

// =============================================================================
// COMMON TYPES
// =============================================================================

// PointId identifies a point using either a UUID or numeric ID.
message PointId {
  oneof point_id_options {
    uint64 num = 1;
    string uuid = 2;
  }
}

// Vector represents a dense embedding vector.
message Vector {
  repeated float data = 1;
}

// NamedVectors for multi-vector support (single vector uses empty key "").
message NamedVectors {
  map<string, Vector> vectors = 1;
}

// Vectors wrapper supporting both single and named vectors.
message Vectors {
  oneof vectors_options {
    Vector vector = 1;
    NamedVectors vectors = 2;
  }
}

// Payload is arbitrary JSON-like data stored with each point.
message Value {
  oneof kind {
    double double_value = 1;
    int64 integer_value = 2;
    string string_value = 3;
    bool bool_value = 4;
    ListValue list_value = 5;
    Struct struct_value = 6;
    NullValue null_value = 7;
  }
}

message ListValue {
  repeated Value values = 1;
}

message Struct {
  map<string, Value> fields = 1;
}

enum NullValue {
  NULL_VALUE = 0;
}

// =============================================================================
// COLLECTION TYPES
// =============================================================================

// VectorParams defines vector configuration for a collection.
message VectorParams {
  uint64 size = 1;           // Vector dimensions
  Distance distance = 2;     // Distance metric
}

// VectorsConfig for single or multiple named vectors.
message VectorsConfig {
  oneof config {
    VectorParams params = 1;
    VectorParamsMap params_map = 2;
  }
}

message VectorParamsMap {
  map<string, VectorParams> map = 1;
}

// Distance metric for vector similarity.
enum Distance {
  UNKNOWN_DISTANCE = 0;
  COSINE = 1;
  EUCLID = 2;
  DOT = 3;
}

// CollectionInfo contains collection metadata and statistics.
message CollectionInfo {
  CollectionStatus status = 1;
  uint64 vectors_count = 2;
  uint64 points_count = 3;
  VectorsConfig config = 4;
}

enum CollectionStatus {
  UNKNOWN_STATUS = 0;
  GREEN = 1;   // Ready
  YELLOW = 2;  // Optimizing
  RED = 3;     // Error
}

// =============================================================================
// POINT TYPES
// =============================================================================

// PointStruct is a point with ID, vectors, and payload.
message PointStruct {
  PointId id = 1;
  Vectors vectors = 2;
  map<string, Value> payload = 3;
}

// ScoredPoint is a search result with similarity score.
message ScoredPoint {
  PointId id = 1;
  float score = 2;
  map<string, Value> payload = 3;
  Vectors vectors = 4;
}

// RetrievedPoint is a fetched point.
message RetrievedPoint {
  PointId id = 1;
  map<string, Value> payload = 2;
  Vectors vectors = 3;
}

// PointsSelector for selecting points by IDs or filter.
message PointsSelector {
  oneof points_selector_one_of {
    PointsIdsList points = 1;
    Filter filter = 2;
  }
}

message PointsIdsList {
  repeated PointId ids = 1;
}

// PointVectors for updating vectors of specific points.
message PointVectors {
  PointId id = 1;
  Vectors vectors = 2;
}

// =============================================================================
// FILTER TYPES
// =============================================================================

// Filter for selecting points by conditions.
message Filter {
  repeated Condition must = 1;
  repeated Condition should = 2;
  repeated Condition must_not = 3;
}

// Condition is a single filter condition.
message Condition {
  oneof condition_one_of {
    FieldCondition field = 1;
    HasIdCondition has_id = 2;
    Filter filter = 3;  // Nested filter
  }
}

// FieldCondition matches a specific field.
message FieldCondition {
  string key = 1;
  Match match = 2;
  Range range = 3;
}

// Match condition for exact value matching.
message Match {
  oneof match_value {
    string keyword = 1;
    int64 integer = 2;
    bool boolean = 3;
  }
}

// Range condition for numeric ranges.
message Range {
  optional double lt = 1;
  optional double gt = 2;
  optional double gte = 3;
  optional double lte = 4;
}

// HasIdCondition matches points by their IDs.
message HasIdCondition {
  repeated PointId has_id = 1;
}

// =============================================================================
// COLLECTION SERVICE
// =============================================================================

service Collections {
  // CreateCollection creates a new vector collection.
  rpc CreateCollection(CreateCollectionRequest) returns (CollectionOperationResponse);

  // GetCollectionInfo returns information about a collection.
  rpc GetCollectionInfo(GetCollectionInfoRequest) returns (GetCollectionInfoResponse);

  // ListCollections lists all collections.
  rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse);

  // DeleteCollection deletes a collection.
  rpc DeleteCollection(DeleteCollectionRequest) returns (CollectionOperationResponse);

  // UpdateCollection updates collection parameters.
  rpc UpdateCollection(UpdateCollectionRequest) returns (CollectionOperationResponse);

  // CollectionExists checks if a collection exists.
  rpc CollectionExists(CollectionExistsRequest) returns (CollectionExistsResponse);
}

message CreateCollectionRequest {
  string collection_name = 1;
  VectorsConfig vectors_config = 2;
}

message CollectionOperationResponse {
  bool result = 1;
  double time = 2;
}

message GetCollectionInfoRequest {
  string collection_name = 1;
}

message GetCollectionInfoResponse {
  CollectionInfo result = 1;
  double time = 2;
}

message ListCollectionsRequest {}

message ListCollectionsResponse {
  repeated CollectionDescription collections = 1;
  double time = 2;
}

message CollectionDescription {
  string name = 1;
}

message DeleteCollectionRequest {
  string collection_name = 1;
}

message UpdateCollectionRequest {
  string collection_name = 1;
  // Optimizers, HNSW params, etc. - NornicDB manages these internally
}

message CollectionExistsRequest {
  string collection_name = 1;
}

message CollectionExistsResponse {
  bool result = 1;
  double time = 2;
}

// =============================================================================
// POINTS SERVICE
// =============================================================================

service Points {
  // === CRUD Operations ===

  // Upsert inserts or updates points in a collection.
  rpc Upsert(UpsertPointsRequest) returns (PointsOperationResponse);

  // Get retrieves points by IDs.
  rpc Get(GetPointsRequest) returns (GetPointsResponse);

  // Delete removes points from a collection.
  rpc Delete(DeletePointsRequest) returns (PointsOperationResponse);

  // Count counts points in a collection.
  rpc Count(CountPointsRequest) returns (CountPointsResponse);

  // === Search Operations ===

  // Search finds similar vectors.
  rpc Search(SearchPointsRequest) returns (SearchPointsResponse);

  // SearchBatch performs multiple search requests.
  rpc SearchBatch(SearchBatchPointsRequest) returns (SearchBatchPointsResponse);

  // SearchGroups searches with grouping by a payload field.
  rpc SearchGroups(SearchPointGroupsRequest) returns (SearchPointGroupsResponse);

  // === Pagination ===

  // Scroll iterates through all points with pagination.
  rpc Scroll(ScrollPointsRequest) returns (ScrollPointsResponse);

  // === Recommendations ===

  // Recommend finds points similar to positive examples and dissimilar to negative.
  rpc Recommend(RecommendPointsRequest) returns (RecommendPointsResponse);

  // RecommendBatch performs multiple recommendation requests.
  rpc RecommendBatch(RecommendBatchPointsRequest) returns (RecommendBatchPointsResponse);

  // === Payload Operations ===

  // SetPayload sets payload values for points (merges with existing).
  rpc SetPayload(SetPayloadPointsRequest) returns (PointsOperationResponse);

  // OverwritePayload replaces entire payload for points.
  rpc OverwritePayload(SetPayloadPointsRequest) returns (PointsOperationResponse);

  // DeletePayload removes specific payload keys from points.
  rpc DeletePayload(DeletePayloadPointsRequest) returns (PointsOperationResponse);

  // ClearPayload removes all payload from points.
  rpc ClearPayload(ClearPayloadPointsRequest) returns (PointsOperationResponse);

  // === Vector Operations ===

  // UpdateVectors updates vectors for existing points.
  rpc UpdateVectors(UpdatePointVectorsRequest) returns (PointsOperationResponse);

  // DeleteVectors removes vectors from points (keeps payload).
  rpc DeleteVectors(DeletePointVectorsRequest) returns (PointsOperationResponse);

  // === Field Indexes ===

  // CreateFieldIndex creates an index on a payload field.
  rpc CreateFieldIndex(CreateFieldIndexCollectionRequest) returns (PointsOperationResponse);

  // DeleteFieldIndex removes a payload field index.
  rpc DeleteFieldIndex(DeleteFieldIndexCollectionRequest) returns (PointsOperationResponse);
}

// === CRUD Messages ===

message UpsertPointsRequest {
  string collection_name = 1;
  repeated PointStruct points = 2;
  optional bool wait = 3;  // Wait for operation to complete
}

message PointsOperationResponse {
  UpdateResult result = 1;
  double time = 2;
}

message UpdateResult {
  UpdateStatus status = 1;
}

enum UpdateStatus {
  UNKNOWN_UPDATE_STATUS = 0;
  ACKNOWLEDGED = 1;
  COMPLETED = 2;
}

message GetPointsRequest {
  string collection_name = 1;
  repeated PointId ids = 2;
  optional WithPayloadSelector with_payload = 3;
  optional WithVectorsSelector with_vectors = 4;
}

message GetPointsResponse {
  repeated RetrievedPoint result = 1;
  double time = 2;
}

message WithPayloadSelector {
  oneof selector_options {
    bool enable = 1;
    PayloadIncludeSelector include = 2;
    PayloadExcludeSelector exclude = 3;
  }
}

message PayloadIncludeSelector {
  repeated string fields = 1;
}

message PayloadExcludeSelector {
  repeated string fields = 1;
}

message WithVectorsSelector {
  oneof selector_options {
    bool enable = 1;
    VectorsSelector include = 2;
  }
}

message VectorsSelector {
  repeated string names = 1;
}

message DeletePointsRequest {
  string collection_name = 1;
  PointsSelector points = 2;
  optional bool wait = 3;
}

message CountPointsRequest {
  string collection_name = 1;
  optional Filter filter = 2;
  optional bool exact = 3;
}

message CountPointsResponse {
  CountResult result = 1;
  double time = 2;
}

message CountResult {
  uint64 count = 1;
}

// === Search Messages ===

message SearchPointsRequest {
  string collection_name = 1;
  repeated float vector = 2;
  uint64 limit = 3;
  optional Filter filter = 4;
  optional WithPayloadSelector with_payload = 5;
  optional WithVectorsSelector with_vectors = 6;
  optional float score_threshold = 7;
  optional uint64 offset = 8;
  optional string vector_name = 9;  // For named vectors
}

message SearchPointsResponse {
  repeated ScoredPoint result = 1;
  double time = 2;
}

message SearchBatchPointsRequest {
  string collection_name = 1;
  repeated SearchPointsRequest search_requests = 2;
}

message SearchBatchPointsResponse {
  repeated SearchPointsResponse result = 1;
  double time = 2;
}

message SearchPointGroupsRequest {
  string collection_name = 1;
  repeated float vector = 2;
  uint64 limit = 3;               // Groups to return
  string group_by = 4;            // Payload field to group by
  uint64 group_size = 5;          // Points per group
  optional Filter filter = 6;
  optional WithPayloadSelector with_payload = 7;
  optional WithVectorsSelector with_vectors = 8;
  optional float score_threshold = 9;
}

message SearchPointGroupsResponse {
  repeated PointGroup result = 1;
  double time = 2;
}

message PointGroup {
  GroupId id = 1;
  repeated ScoredPoint hits = 2;
}

message GroupId {
  oneof kind {
    uint64 unsigned_value = 1;
    int64 integer_value = 2;
    string string_value = 3;
  }
}

// === Scroll Messages ===

message ScrollPointsRequest {
  string collection_name = 1;
  optional Filter filter = 2;
  optional PointId offset = 3;      // Start after this point ID
  optional uint32 limit = 4;        // Points per page (default: 10)
  optional WithPayloadSelector with_payload = 5;
  optional WithVectorsSelector with_vectors = 6;
}

message ScrollPointsResponse {
  repeated RetrievedPoint result = 1;
  optional PointId next_page_offset = 2;  // Use as offset for next page
  double time = 3;
}

// === Recommend Messages ===

message RecommendPointsRequest {
  string collection_name = 1;
  repeated PointId positive = 2;          // Points to find similar to
  repeated PointId negative = 3;          // Points to avoid similarity to
  uint64 limit = 4;
  optional Filter filter = 5;
  optional WithPayloadSelector with_payload = 6;
  optional WithVectorsSelector with_vectors = 7;
  optional float score_threshold = 8;
  optional uint64 offset = 9;
  optional string using = 10;             // Named vector to use
  optional LookupLocation lookup_from = 11;  // Source collection for IDs
}

message RecommendPointsResponse {
  repeated ScoredPoint result = 1;
  double time = 2;
}

message RecommendBatchPointsRequest {
  string collection_name = 1;
  repeated RecommendPointsRequest recommend_requests = 2;
}

message RecommendBatchPointsResponse {
  repeated RecommendPointsResponse result = 1;
  double time = 2;
}

message LookupLocation {
  string collection_name = 1;
  optional string vector_name = 2;
}

// === Payload Operation Messages ===

message SetPayloadPointsRequest {
  string collection_name = 1;
  optional bool wait = 2;
  map<string, Value> payload = 3;
  optional PointsSelector points_selector = 4;  // Which points to update
}

message DeletePayloadPointsRequest {
  string collection_name = 1;
  optional bool wait = 2;
  repeated string keys = 3;                     // Keys to delete
  optional PointsSelector points_selector = 4;  // Which points to update
}

message ClearPayloadPointsRequest {
  string collection_name = 1;
  optional bool wait = 2;
  optional PointsSelector points = 3;           // Which points to clear
}

// === Vector Operation Messages ===

message UpdatePointVectorsRequest {
  string collection_name = 1;
  optional bool wait = 2;
  repeated PointVectors points = 3;  // Points with new vectors
}

message DeletePointVectorsRequest {
  string collection_name = 1;
  optional bool wait = 2;
  PointsSelector points_selector = 3;
  VectorsSelector vectors = 4;  // Which named vectors to delete
}

// === Field Index Messages ===

message CreateFieldIndexCollectionRequest {
  string collection_name = 1;
  optional bool wait = 2;
  string field_name = 3;
  optional PayloadIndexType field_type = 4;
}

message DeleteFieldIndexCollectionRequest {
  string collection_name = 1;
  optional bool wait = 2;
  string field_name = 3;
}

enum PayloadIndexType {
  UNKNOWN_INDEX_TYPE = 0;
  KEYWORD = 1;    // String exact match
  INTEGER = 2;    // Numeric range
  FLOAT = 3;      // Float range
  GEO = 4;        // Geographic point
  TEXT = 5;       // Full-text search
}

// =============================================================================
// HEALTH SERVICE (gRPC standard health checking)
// =============================================================================

service Health {
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
}

message HealthCheckRequest {
  string service = 1;
}

message HealthCheckResponse {
  ServingStatus status = 1;
}

enum ServingStatus {
  UNKNOWN = 0;
  SERVING = 1;
  NOT_SERVING = 2;
}

// =============================================================================
// SNAPSHOTS SERVICE
// =============================================================================

service Snapshots {
  // Create creates a new snapshot of a collection.
  rpc Create(CreateSnapshotRequest) returns (CreateSnapshotResponse);

  // List lists all snapshots for a collection.
  rpc List(ListSnapshotsRequest) returns (ListSnapshotsResponse);

  // Delete removes a snapshot.
  rpc Delete(DeleteSnapshotRequest) returns (DeleteSnapshotResponse);

  // CreateFull creates a full storage snapshot (all collections).
  rpc CreateFull(CreateFullSnapshotRequest) returns (CreateSnapshotResponse);

  // ListFull lists all full storage snapshots.
  rpc ListFull(ListFullSnapshotsRequest) returns (ListSnapshotsResponse);

  // DeleteFull removes a full storage snapshot.
  rpc DeleteFull(DeleteFullSnapshotRequest) returns (DeleteSnapshotResponse);
}

message CreateSnapshotRequest {
  string collection_name = 1;
  optional bool wait = 2;  // Wait for snapshot to complete
}

message CreateSnapshotResponse {
  SnapshotDescription result = 1;
  double time = 2;
}

message ListSnapshotsRequest {
  string collection_name = 1;
}

message ListSnapshotsResponse {
  repeated SnapshotDescription snapshots = 1;
  double time = 2;
}

message DeleteSnapshotRequest {
  string collection_name = 1;
  string snapshot_name = 2;
  optional bool wait = 3;
}

message DeleteSnapshotResponse {
  bool result = 1;
  double time = 2;
}

message CreateFullSnapshotRequest {
  optional bool wait = 1;
}

message ListFullSnapshotsRequest {}

message DeleteFullSnapshotRequest {
  string snapshot_name = 1;
  optional bool wait = 2;
}

message SnapshotDescription {
  string name = 1;
  int64 creation_time = 2;  // Unix timestamp
  int64 size = 3;           // Size in bytes
}
